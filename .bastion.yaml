# Bastion reviewer registry for sandi.
#
# Reviewers are declarative and static: one concern per reviewer, defined here
# rather than generated by code, so they stay reviewable and produce a stable
# trigger set. Because this file is the review policy, changes to it require human
# review; the generated CODEOWNERS block (see `bastion github codeowners`) protects
# it and the workflow that runs it.
#
# Bastion runs these in the local loop (`bastion review`) and in CI
# (`.github/workflows/bastion.yml`). Every reviewer runs on the Codex backend,
# billed to the PR author's own ChatGPT subscription; the per-author auth wiring is
# in the workflow. The schema is documented at bastion.jessica.black/guide.
#
# Scope note: these reviewers deliberately avoid what the repo already enforces
# mechanically. Biome gates `any`, non-null assertions, and type assertions, and
# `npm run check` runs src/lib/verification/verify-surface-boundary.ts, which
# already enforces the surface/lib boundary and Pi-extension relative imports. So
# the reviewers below cover only semantic concerns those checks cannot see.

# Registry-wide defaults, inherited by every reviewer that does not set the field
# itself (an explicit field on a reviewer wins). Every reviewer below pins
# `backend: codex`, which satisfies the rule that an inherited model needs a pinned
# backend (a model under `backend: any` is a load error). The Codex backend
# forwards `model` as `-m` and `effort` as `model_reasoning_effort`, so this selects
# gpt-5.5 at high reasoning effort for every review.
defaults:
  model: gpt-5.5
  effort: high

reviewers:
  - name: single-responsibility
    trigger: [src/**/*.ts]
    mode: gate
    backend: codex
    prompt: |
      Review the changeset to determine whether any one file concentrates too
      many unrelated responsibilities. If a file has clearly taken on multiple
      distinct concerns that should be separate modules, block the PR and name the
      file(s) and the concerns; otherwise approve it. A single large but cohesive
      module (everything in it serving one concern) is not a violation. This
      codebase favors small domain modules with descriptive kebab-case names, so
      judge against that grain.

  - name: error-handling
    trigger: [src/**/*.ts]
    mode: gate
    backend: codex
    prompt: |
      Review the changeset for error-handling discipline in this TypeScript code.
      Block the PR if you find any of these in non-test code; otherwise approve it.

      - A promise that is created but never awaited or returned (a floating
        promise), so a rejection becomes an unhandled rejection that escapes its
        caller. This includes async work started in an event handler or loop
        without awaiting or explicitly handling it.
      - A caught error that is swallowed: an empty `catch`, or a `catch` that
        discards the error and silently continues as if the operation succeeded,
        when the failure should propagate or be surfaced.
      - An external call to Discord, GitHub, the Pi gateway, the filesystem, or a
        subprocess whose failure is treated as success, so a gate that should
        fail closed instead proceeds on bad or missing data.

      Errors that are caught and genuinely handled (logged and recovered, retried,
      or rethrown with context) are fine. A `verify-*.ts` script that exits
      non-zero on failure is correct, not a violation.

  - name: boundary-parsing
    trigger: [src/**/*.ts]
    mode: gate
    backend: codex
    prompt: |
      This repo follows parse-don't-validate and bans type assertions: data
      crossing a boundary (environment variables, config and overlay files, Discord
      and GitHub API payloads, Pi gateway and agent responses, subprocess output)
      should be parsed once into a precise type, a zod schema or a discriminated
      union that makes invalid states unrepresentable, rather than carried around
      loosely typed and re-checked at each use.

      This is a gate. Block the PR if the change introduces a new boundary that
      accepts external data without parsing it into a precise type, then carries
      that raw value into the program where a wrong shape would surface as a bug far
      from the boundary; otherwise approve it. Name the boundary and the type that
      should parse it. Reaching into a loosely typed value with optional chaining or
      ad hoc checks where a parsed type would remove a class of bugs, and re-
      validating data a boundary already parsed upstream, are also blocking. A value
      that stays internal to already-typed code, or a boundary that is already
      parsed with zod or an equivalent precise type, is not a violation.

  - name: secret-and-config-hygiene
    trigger: [src/**/*.ts, ".env.example", "config/**"]
    mode: gate
    backend: codex
    prompt: |
      Sandi reads its secrets and configuration from the environment, centralized
      in src/lib/config/env.ts, with every supported variable documented in
      .env.example. You are running in the repository, so read env.ts and
      .env.example directly.

      This is a gate. Block the PR if either of the following is definitely true
      for the change; otherwise approve it. When you cannot confirm a problem,
      approve.

      - A credential, token, API key, webhook secret, or other secret value is
        hardcoded into source instead of read from the environment, or an existing
        secret is logged, printed, or written into committed data.
      - The change reads a new required environment variable (a new `process.env`
        key the code depends on) but does not add it to .env.example, so a fresh
        checkout cannot be configured to run.

      A new optional variable with a safe documented default, or a test or verify
      script reading an existing variable, is not a violation.

  - name: verification-coverage
    trigger: [src/**/*.ts]
    mode: advisor
    backend: codex
    prompt: |
      This repo verifies behavior with `verify-*.ts` scripts wired into
      `npm run check` (and `*.test.ts` where present) rather than a single test
      framework. As an advisor, check whether new or changed behavior in this
      changeset is covered by a verification script or test. Report uncovered
      behavior as optional findings naming the file and the behavior that lacks
      coverage, so the author can decide; do not block.

  - name: prose-anti-slop
    # "*.md" covers the root markdown (README, AGENTS, CONTRIBUTING, SECURITY,
    # CODE_OF_CONDUCT); docs/**/*.md covers the notes under docs/.
    trigger: [docs/**/*.md, "*.md"]
    mode: gate
    backend: codex
    prompt: |
      As a gate, review only the user-facing PROSE in the changed files for
      AI-register "slop": the structural tics that make copy read as machine-
      written. The tells are structural, not vocabulary, so do not just hunt for
      buzzwords.

      Decision:

      - If the changed prose carries one or more slop tells from the list below,
        return verdict: block. Enumerate EVERY instance across all changed prose in
        this single pass: emit one blocking finding per instance, each naming the
        file, the line or sentence, which tell it is, and a shorter rewrite that
        keeps every fact. Do not stop after the first tell.
      - If the changed prose is clean, return verdict: pass.
      - Bias toward catching slop: a false block is cheap to override. Still respect
        the discipline below so the gate stays signal, not noise.

      Flag these:

      - Virtue or character framing: prose that asserts the project is honest,
        trustworthy, principled, or humble instead of stating what it does.
      - Manufactured antithesis ("X, not Y") where the second half is a strawman or
        a vibe rather than a real, distinct, true alternative.
      - Aphorism openers or closers: a section that opens or closes on a tidy maxim.
        Cut the maxim; the surrounding fact already carries it.
      - Triadic parallelism and rule-of-three cadence used for rhythm rather than
        because there are exactly three real, distinct items.
      - The dramatic colon: a setup then payoff staged for suspense.
      - Uniform clipped-fragment headers (every header a short declarative with a
        terminal period). Suggest varying them.
      - The meta-pattern: every sentence doing rhetorical work. Real copy is lumpier
        and lets some sentences be flat and informational.
      - Em dashes or en dashes, and the literal "--" used as a dash, in prose:
        recast with a comma, a colon, or parentheses. Ignore "--flag" forms inside
        commands and code.

      Discipline:

      - Touch only prose. Leave code blocks, YAML, CLI examples, command flags,
        tables, and quoted or third-party material exactly as they are.
      - Do not over-correct. Flat, fragment-phobic, antithesis-phobic prose is its
        own tell; one beat of personality per section is fine.
      - Apply the test: if a fact survives the rewrite and the copy got shorter, the
        cut was slop. If a rewrite would drop information, do not suggest it.

name: bastion

# Bastion review for sandi. On every pull request this downloads a published
# `bastion` release binary, installs the Codex CLI, authenticates it as the PR
# author's own ChatGPT subscription, and runs `bastion review` over the changeset.
# A blocked review exits non-zero and fails the job. Branch protection on `main`
# should require the aggregate `bastion` check so a blocking gate stops the merge.
#
# When the PR author has signed a local review (`bastion attest`, pushed to
# refs/notes/bastion) and the registry sets `attestations: true`, CI verifies
# that note against the head commit and replays the reviewers from the sealed
# bundle instead of re-running Codex, so a green local run costs no subscription
# tokens to confirm here. A missing or stale note falls back to an ordinary fresh
# review; it never fails open to a silent pass.
#
# The reviewer engine is a released bastion binary, not one built from the PR's
# own sources, so a change can never edit the engine that judges it. Reviewer
# policy (.bastion.yaml) is still read from the checkout so prompt and trigger
# changes take effect in the same PR; that file and this workflow are
# CODEOWNERS-protected.
#
# After the review, `bastion github report` posts a sticky PR comment carrying
# every reviewer's verdict and findings, one check run per reviewer, and the
# always-present aggregate `bastion` check. The full run is uploaded as an
# artifact. See bastion.jessica.black/guide for the full adapter reference.

on:
  pull_request:
    types: [opened, synchronize, reopened]

# Read the diff and fail the job, and write the surfaces `bastion github report`
# posts: the sticky PR comment (`pull-requests: write`) and the per-reviewer and
# aggregate check runs (`checks: write`).
permissions:
  contents: read
  pull-requests: write
  checks: write

# One in-flight review per PR; a new push cancels the previous run.
concurrency:
  group: bastion-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    name: bastion review
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Whether the optional dedicated app is fully configured. The id and the
    # private key are one credential, so this is true only when both are set: a
    # half-set repo then falls back cleanly instead of running the mint step and
    # failing it. Computed here because the mint step's `if:` can read `env` but
    # not `secrets`.
    env:
      HAS_BASTION_APP: ${{ secrets.BASTION_APP_ID != '' && secrets.BASTION_APP_PRIVATE_KEY != '' }}
    # The ChatGPT subscription credentials live in an Actions secret, and GitHub
    # does not share secrets with workflows triggered by fork PRs. We also will
    # not run an agentic backend over untrusted code with a live credential. So
    # this runs for same-repo PRs only; a maintainer reviews a fork PR by pushing
    # its branch to a trusted branch in this repo.
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v7
        with:
          # The PR head commit, not the default merge commit. An attestation note
          # binds to the head tree the author signed, and a merge commit's tree
          # never matches it, so replay would always be refused. This also mirrors
          # the changeset the author's local `bastion review` diffed.
          ref: ${{ github.event.pull_request.head.sha }}
          # Full history so the base branch resolves for the changeset diff.
          fetch-depth: 0

      - name: Fetch the attestation notes ref
        # actions/checkout does not fetch git notes, and an author's attestation
        # lives under refs/notes/bastion. Fetch it so `bastion review` can find and
        # verify a note on HEAD. Tolerate its absence: most PRs carry no
        # attestation, which is the ordinary case, not an error.
        run: git fetch origin "+refs/notes/bastion:refs/notes/bastion" || true

      - name: Install the bastion release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          repo="jssblck/bastion"
          # The latest published release. `gh release view` with no tag uses
          # GitHub's "latest" (most recent non-draft, non-prerelease), so the
          # engine auto-advances but never silently adopts an `-rc` build.
          version="$(gh release view --repo "$repo" --json tagName -q .tagName)"
          echo "Using bastion engine: $version"
          # Expose the resolved version to later steps (e.g. the report notice).
          echo "BASTION_ENGINE_VERSION=$version" >> "$GITHUB_ENV"
          asset="bastion-x86_64-unknown-linux-gnu.tar.gz"
          dest="$RUNNER_TEMP/bastion"
          mkdir -p "$dest"
          gh release download "$version" \
            --repo "$repo" \
            --pattern "$asset" \
            --dir "$dest"
          tar -xzf "$dest/$asset" -C "$dest"
          # The archive extracts to a directory named after the asset stem.
          echo "$dest/${asset%.tar.gz}" >> "$GITHUB_PATH"

      - name: Verify bastion
        run: bastion --version

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install the Codex CLI
        run: |
          set -euo pipefail
          npm install -g @openai/codex
          codex --version

      - name: Authenticate Codex as the PR author
        env:
          # Bastion bills each PR's reviews to its author's own ChatGPT
          # subscription through the Codex CLI. The author's GitHub login maps to a
          # `CODEX_AUTH_<LOGIN>` secret holding the contents of that person's
          # `~/.codex/auth.json` (captured locally with `codex login`); Codex
          # refreshes the short-lived access token from the stored refresh token at
          # run time, so the secret does not need rotating every run. To onboard a
          # contributor, add their secret and a `case` arm below. The mapping lives
          # here, in a CODEOWNERS-protected workflow, so changing who may spend a
          # subscription is itself a reviewed change. An unmapped author fails
          # closed (the gate blocks) rather than silently billing someone else.
          #
          # Bot authors (dependabot[bot]) have no subscription of their own, so
          # their PRs bill to a maintainer who has opted in to sponsor them. Note
          # that GitHub serves secrets to Dependabot-triggered runs from the
          # separate Dependabot secret store, not the Actions store, so any
          # CODEX_AUTH_<LOGIN> a bot arm references must also be set as a Dependabot
          # secret (gh secret set CODEX_AUTH_JSSBLCK --app dependabot) or it arrives
          # empty and the gate blocks.
          AUTHOR: ${{ github.event.pull_request.user.login }}
          CODEX_AUTH_JSSBLCK: ${{ secrets.CODEX_AUTH_JSSBLCK }}
        run: |
          set -euo pipefail
          author="$(printf '%s' "$AUTHOR" | tr '[:upper:]' '[:lower:]')"
          # Quote bracketed bot logins; unquoted, case reads [bot] as a glob class.
          case "$author" in
            jssblck) cred="$CODEX_AUTH_JSSBLCK" ;;
            # sandi-witch is Sandi's own bot account and has no subscription of
            # its own, so its PRs bill to the maintainer who sponsors it, the
            # same way bot authors below do.
            sandi-witch) cred="$CODEX_AUTH_JSSBLCK" ;;
            'dependabot[bot]') cred="$CODEX_AUTH_JSSBLCK" ;;
            *)
              echo "::error::No Codex subscription is mapped for PR author '$AUTHOR'. Add a CODEX_AUTH_<LOGIN> secret and a case arm in .github/workflows/bastion.yml." >&2
              exit 1
              ;;
          esac
          if [ -z "$cred" ]; then
            echo "::error::Codex credential for '$AUTHOR' is mapped but its secret is empty; set the matching CODEX_AUTH_<LOGIN> repository secret." >&2
            exit 1
          fi
          mkdir -p "$HOME/.codex"
          printf '%s' "$cred" > "$HOME/.codex/auth.json"
          chmod 600 "$HOME/.codex/auth.json"
          # Pin ChatGPT-subscription auth so a stray OPENAI_API_KEY in the
          # environment can never silently switch a review to metered API billing.
          # Model (gpt-5.5) and effort (high) come from .bastion.yaml, which the
          # Codex backend forwards as `-m` and `model_reasoning_effort`.
          printf '%s\n' 'preferred_auth_method = "chatgpt"' > "$HOME/.codex/config.toml"
          chmod 600 "$HOME/.codex/config.toml"

      - name: Run bastion review
        env:
          # Keep run history inside the workspace so it can be uploaded as an
          # artifact instead of landing in the runner's per-user data directory.
          BASTION_DATA_DIR: ${{ github.workspace }}/.bastion
          # Resolve the `codex` binary npm just put on PATH.
          BASTION_CODEX_BIN: codex
          # Read access for the PR context that `--repo`/`--pr` gather, and to
          # check the author's GitHub-registered signing keys when verifying an
          # attestation note.
          GITHUB_TOKEN: ${{ github.token }}
        # Default GitHub bash runs with `-eo pipefail`, so a blocked review's
        # non-zero exit fails the job (and the required check). The human-readable
        # stream goes to the log; the canonical JSONL is persisted under
        # BASTION_DATA_DIR and uploaded below.
        #
        # `--repo`/`--pr` give the reviewers the PR's description and discussion as
        # context and, with `attestations: true` in .bastion.yaml, arm attestation
        # replay: a verified note on HEAD replays the reviewers from the sealed
        # bundle and spends no Codex tokens. A missing or invalid note falls back
        # to an ordinary fresh review.
        run: >-
          bastion review
          --base "origin/${{ github.base_ref }}"
          --repo "${{ github.repository }}"
          --pr "${{ github.event.pull_request.number }}"

      - name: Mint a dedicated app token for reporting
        id: app-token
        # Optional, and only when a dedicated Bastion GitHub App is configured (the
        # BASTION_APP_ID / BASTION_APP_PRIVATE_KEY secrets). Posting the check runs
        # under a distinct app gives them their own check suite, so the PR renders
        # them under the app's name. Without a dedicated app the report step below
        # falls back to the default GITHUB_TOKEN, which still posts but, because
        # every workflow shares the one github-actions app identity, GitHub buckets
        # the API-created check runs into whichever of this commit's check suites it
        # picks. The mint runs on `always()` so reporting works even when the review
        # blocked and failed the job above.
        if: ${{ always() && env.HAS_BASTION_APP == 'true' }}
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.BASTION_APP_ID }}
          private-key: ${{ secrets.BASTION_APP_PRIVATE_KEY }}

      - name: Report the review to the pull request
        # Runs even when the review blocked (and so failed the job above), so the PR
        # always gets the comment and the per-reviewer checks. It reads the run that
        # `bastion review` just persisted under BASTION_DATA_DIR; if no run was
        # recorded it prints a notice and exits 0 rather than piling a second error
        # on top of the real one. Creating check runs needs a GitHub App
        # installation token (a classic PAT cannot); both the minted dedicated-app
        # token and the default GITHUB_TOKEN qualify, so this uses the dedicated-app
        # token when present and falls back to GITHUB_TOKEN otherwise.
        if: always()
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token || github.token }}
          BASTION_DATA_DIR: ${{ github.workspace }}/.bastion
        run: |
          set -euo pipefail
          if ! bastion github report --help >/dev/null 2>&1; then
            echo "::notice::bastion engine ${BASTION_ENGINE_VERSION:-unknown} has no 'github report'; skipping PR comment and checks until the latest release includes it."
            exit 0
          fi
          bastion github report \
            --repo "${{ github.repository }}" \
            --pr "${{ github.event.pull_request.number }}" \
            --sha "${{ github.event.pull_request.head.sha }}"

      - name: Upload the run
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bastion-run
          path: ${{ github.workspace }}/.bastion/runs/**
          if-no-files-found: warn

      - name: Export agent sessions to AgentsView
        # Ship this run's Codex sessions to the central AgentsView database
        # (db.sandi.jessica.black) so CI token usage, cost, and activity show up
        # in the dashboard next to every machine's own sessions. The bastion
        # review runs through the Codex CLI, which writes its sessions under
        # $HOME/.codex/sessions; this pushes them once, at the end of the job.
        #
        # Runs on always() so a blocked (and therefore failed) review still
        # reports its session, and continue-on-error so a transient push failure
        # can never turn a passing review into a failing required check.
        #
        # The DSN is a repository secret, never a literal in YAML or the logs.
        # It must be set in BOTH the Actions and the Dependabot secret stores,
        # because Dependabot-triggered runs read only their own store: an empty
        # value there would silently no-op the push for Dependabot PRs.
        if: always()
        continue-on-error: true
        env:
          AGENTSVIEW_PG_URL: ${{ secrets.AGENTSVIEW_PG_URL }}
          # One stable CI identity per repo; concurrent runs push distinct
          # session ids and Postgres deduplicates by fingerprint.
          AGENTSVIEW_PG_MACHINE: ci-${{ github.repository }}
        run: |
          set -euo pipefail
          if [ -z "${AGENTSVIEW_PG_URL:-}" ]; then
            echo "::notice::AGENTSVIEW_PG_URL is not set for this run (check the Actions and Dependabot secret stores); skipping the AgentsView push."
            exit 0
          fi
          docker run --rm \
            -e AGENTSVIEW_PG_URL -e AGENTSVIEW_PG_MACHINE \
            -e AGENTSVIEW_TELEMETRY_ENABLED=0 \
            -e CODEX_SESSIONS_DIR=/agents/codex \
            -v "$HOME/.codex/sessions:/agents/codex:ro" \
            ghcr.io/kenn-io/agentsview:latest pg push

# Packaging for the desktop app. Windows is the shipped target (NSIS installer
# plus a portable exe); the mac and linux blocks are stubs so a future build
# has a starting point, and nothing in the app code is Windows-only beyond
# what these targets imply.
#
# Known gap: the artifacts are unsigned, so SmartScreen warns on first run.
# (Auto-update still works: electron-updater only enforces signature checks
# when the installed app itself is signed.)

appId: black.jessica.sandi
productName: Sandi
directories:
  buildResources: build
  output: release

# Where installed apps look for updates. This block does double duty: at
# package time it makes electron-builder emit the update feed (latest.yml plus
# the .exe.blockmap files) into release/ and embed the feed location in the
# app's resources (app-update.yml), and at run time electron-updater (see
# src/main/updater.ts) reads that to poll this repo's GitHub Release assets.
# CI never publishes through this provider: the packaging workflow runs
# --publish never and attaches the assets itself with gh.
publish:
  provider: github
  owner: sandi-black
  repo: sandi

# Electron Vite bundles most runtime dependencies into out/. Dependencies left
# external by the main build remain declared in package.json and are collected
# by electron-builder.
files:
  - out/**
asar: true
npmRebuild: false

win:
  icon: build/icons/icon.ico
  target:
    - nsis
    - portable

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  shortcutName: Sandi
  artifactName: ${productName}-${version}-setup.${ext}

portable:
  artifactName: ${productName}-${version}-portable.${ext}

# Stubs: not built by `npm run package` (which passes --win), kept so the
# config is one flag away from other platforms.
mac:
  category: public.app-category.productivity
  icon: build/icons/icon.ico
linux:
  target:
    - AppImage
  category: Utility

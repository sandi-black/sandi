<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Sandi</title>
    <style>
      /* The window is exactly one sprite frame; anything painted here other
         than the canvas would become a visible box on the desktop. */
      html,
      body {
        margin: 0;
        padding: 0;
        background: transparent;
        overflow: hidden;
        width: 100%;
        height: 100%;
        user-select: none;
      }
      canvas {
        display: block;
        width: 100%;
        height: 100%;
        image-rendering: pixelated;
      }
    </style>
  </head>
  <body>
    <canvas id="pet"></canvas>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
